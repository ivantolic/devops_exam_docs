# LO4.30 — emptyDir sizeLimit
# Goal: create temporary Pod storage with a size limit.
# If the container writes too much data, the kubelet may evict the Pod.
apiVersion: v1
kind: Pod
metadata:
  name: sizelimit-demo
spec:
  volumes:
  - name: scratch
    emptyDir:
      # This is a limit for emptyDir usage. It is enforced through kubelet eviction behavior.
      sizeLimit: 100Mi
  containers:
  - name: app
    image: busybox
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: scratch
      mountPath: /scratch
