# LO4.26 / LO4.34 — Secret mounted as a volume
# Goal: mount Secret values as files with restrictive permissions.
# Before applying this file, create the Secret:
# kubectl create secret generic mysecret --from-literal=username=admin --from-literal=password=s3cret --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Pod
metadata:
  name: secret-demo
spec:
  volumes:
  - name: sec
    secret:
      secretName: mysecret
      # Files inside the Secret volume will be owner-read-only.
      defaultMode: 0400
  containers:
  - name: app
    image: busybox
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: sec
      mountPath: /etc/sec
      # Secret volume should normally be read-only.
      readOnly: true
