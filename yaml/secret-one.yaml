# LO4.37 — Mount only one Secret key
# Goal: Secret has keys a, b, c, but Pod mounts only key b as file only-b.txt.
# Before applying this file, create the Secret:
# kubectl create secret generic multi --from-literal=a=1 --from-literal=b=2 --from-literal=c=3 --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Pod
metadata:
  name: secret-one
spec:
  volumes:
  - name: sec
    secret:
      secretName: multi
      # items filters which Secret keys are projected into the volume.
      items:
      - key: b
        path: only-b.txt
  containers:
  - name: app
    image: busybox
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: sec
      mountPath: /etc/sec
